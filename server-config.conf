# ============================================================================
# server-config.conf — สำหรับ replace-token-email.sh v3
# เก็บใน public repo: AnonymousVS/litespeed-cloudflare-api-email
# หรือวางบน server: /usr/local/etc/litespeed-cloudflare/server-config.conf
# ============================================================================

# ─── cPanel Users ─────────────────────────────────────────────
# ระบุ cPanel user ที่ต้องการ (คั่นด้วย space)
# ว่าง = scan ทุก user บน server
# ตัวอย่าง: CPANEL_USERS="y2026m04ns504 jan2026newkey"
CPANEL_USERS=""

# ─── Cloudflare Email ─────────────────────────────────────────
# Email ของ Cloudflare account (ใช้สำหรับ LiteSpeed CDN settings)
# สำหรับ API Token (cfut_) → email จะถูก set เป็นว่างอัตโนมัติ
# ใส่ไว้เพื่อ reference เท่านั้น
CF_EMAIL=""

# ─── Telegram Notification ────────────────────────────────────
TELEGRAM_BOT_TOKEN="8728146015:AAHEqYfqU8DOEc99BhPNci7HOFEMVGfiaeQ"
TELEGRAM_CHAT_ID="-5223351518"

# ─── ตัวเลือก ────────────────────────────────────────────────
# CF_ONLY_ACTIVE=yes → อัปเดตเฉพาะเว็บที่เปิด Cloudflare อยู่แล้ว
# CF_ONLY_ACTIVE=no  → อัปเดตทุกเว็บ (เปิด CF ให้ด้วย)
CF_ONLY_ACTIVE="no"

# CF_OVERWRITE_KEY=yes → เขียนทับ key เดิมทุกเว็บ
# CF_OVERWRITE_KEY=no  → ข้ามเว็บที่มี key อยู่แล้ว
CF_OVERWRITE_KEY="yes"
