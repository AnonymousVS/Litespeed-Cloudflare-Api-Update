# =============================================================
#  token-email-replace.conf
#  ไฟล์ config สำหรับ token-email-replace.sh
#
#  วิธีใช้:
#    1. แก้ค่าใน section ด้านล่าง
#    2. รัน: bash token-email-replace.sh
#       หรือ: bash token-email-replace.sh /path/to/custom.conf
# =============================================================


# ─── โหมดการ Auth Cloudflare ──────────────────────────────────
#
#  "token"  → ใช้ API Token  (แนะนำ — สร้างจาก CF Dashboard)
#             ไม่ต้องใส่ CF_EMAIL
#
#  "apikey" → ใช้ Global API Key + Email (แบบเดิม)
#             ต้องใส่ทั้ง CF_KEY และ CF_EMAIL
#
CF_AUTH_MODE="token"


# ─── Credentials ใหม่ที่ต้องการอัปเดต ────────────────────────
#
#  CF_KEY   : API Token  (ถ้า CF_AUTH_MODE=token)
#           : Global API Key (ถ้า CF_AUTH_MODE=apikey)
#
CF_KEY="YOUR_API_TOKEN_OR_GLOBAL_KEY_HERE"

#  CF_EMAIL : ใส่เฉพาะตอน CF_AUTH_MODE=apikey
#             ถ้า CF_AUTH_MODE=token ปล่อยว่างได้เลย
#
CF_EMAIL=""


# ─── ตัวเลือกเพิ่มเติม ────────────────────────────────────────
#
#  CF_CLEAR_ZONE : ล้าง zone_id เดิมออกหลังอัปเดต credential
#                  (แนะนำ "yes" เพื่อให้ plugin ดึง zone ใหม่จาก key ใหม่)
#                  "yes" / "no"
#
CF_CLEAR_ZONE="yes"

#  CF_ONLY_ACTIVE : อัปเดตเฉพาะเว็บที่เปิด Cloudflare ใน plugin ไว้แล้ว
#                   "yes" = ข้ามเว็บที่ CF ปิดอยู่
#                   "no"  = อัปเดตทุกเว็บที่มี LiteSpeed Cache active
#
CF_ONLY_ACTIVE="no"

#  CF_OVERWRITE_KEY : ถ้าเว็บนั้นมี key อยู่แล้ว จะเขียนทับไหม?
#                     "yes" = เขียนทับทุกเว็บ
#                     "no"  = ข้ามเว็บที่มี key อยู่แล้ว
#
CF_OVERWRITE_KEY="yes"
