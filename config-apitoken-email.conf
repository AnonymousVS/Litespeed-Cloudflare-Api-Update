# =============================================================
#  config-apitoken-email.conf
#  ไฟล์ config สำหรับ replace-token-email.sh
#
#  วิธีใช้:
#    1. แก้ค่าใน section ด้านล่าง
#    2. รัน: bash replace-token-email.sh
#       หรือ: bash replace-token-email.sh /path/to/custom.conf
# =============================================================


# ─── Credentials ใหม่ที่ต้องการอัปเดต ────────────────────────
#
#  CF_KEY   : ใส่ API Token หรือ Global API Key
#
#  Script จะ auto-detect mode ให้อัตโนมัติ:
#    → CF_EMAIL ว่างเปล่า  =  API Token mode   (ไม่ต้องการ email)
#    → CF_EMAIL มีค่า      =  Global API Key mode
#
CF_KEY="YOUR_API_TOKEN_OR_GLOBAL_KEY_HERE"

#  CF_EMAIL : ใส่ถ้าใช้ Global API Key
#             ใช้ API Token → ปล่อยว่างได้เลย
#
CF_EMAIL=""


# ─── ตัวเลือกเพิ่มเติม ────────────────────────────────────────
#
#  CF_CLEAR_ZONE : ล้าง zone_id เดิมออกหลังอัปเดต credential
#                  (แนะนำ "yes" เพื่อให้ plugin ดึง zone ใหม่จาก key ใหม่)
#                  "yes" / "no"
#
CF_CLEAR_ZONE="yes"

#  CF_ONLY_ACTIVE : อัปเดตเฉพาะเว็บที่เปิด Cloudflare ใน plugin ไว้แล้ว
#                   "yes" = ข้ามเว็บที่ CF ปิดอยู่
#                   "no"  = อัปเดตทุกเว็บที่มี LiteSpeed Cache active
#
CF_ONLY_ACTIVE="no"

#  CF_OVERWRITE_KEY : ถ้าเว็บนั้นมี key อยู่แล้ว จะเขียนทับไหม?
#                     "yes" = เขียนทับทุกเว็บ
#                     "no"  = ข้ามเว็บที่มี key อยู่แล้ว
#
CF_OVERWRITE_KEY="yes"
